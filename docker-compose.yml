version: '3.8'

services:
  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8001:8001"
    networks:
      - ecommerce-net
    restart: unless-stopped

  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "8002:8002"
    networks:
      - ecommerce-net
    restart: unless-stopped

  cart-service:
    build: ./services/cart-service
    container_name: cart-service
    ports:
      - "8003:8003"
    networks:
      - ecommerce-net
    restart: unless-stopped

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8004:8004"
    networks:
      - ecommerce-net
    restart: unless-stopped

  shipment-service:
    build: ./services/shipment-service
    container_name: shipment-service
    ports:
      - "8005:8005"
    networks:
      - ecommerce-net
    restart: unless-stopped

networks:
  ecommerce-net:
    driver: bridge